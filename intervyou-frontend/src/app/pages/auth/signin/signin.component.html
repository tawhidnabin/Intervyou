<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-interv">Interv</span><span class="logo-you">You</span></div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to continue your interview practice</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <div class="field">
        <label>Email address</label>
        <input type="email" formControlName="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-submit" [disabled]="form.invalid || loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <p class="auth-footer">Don't have an account? <a routerLink="/auth/signup">Sign up free</a></p>
  </div>
</div>
