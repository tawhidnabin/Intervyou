<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-interv">Interv</span><span class="logo-you">You</span></div>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Start practising interviews with AI feedback today</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <div class="field">
        <label>Full name</label>
        <input type="text" formControlName="name" placeholder="Jane Smith" autocomplete="name">
        <span class="field-error" *ngIf="form.get('name')?.touched && form.get('name')?.errors">
          Name must be 2&#8211;100 characters.
        </span>
      </div>
      <div class="field">
        <label>Email address</label>
        <input type="email" formControlName="email" placeholder="you&#64;example.com" autocomplete="email">
        <span class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.errors">
          Please enter a valid email address.
        </span>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Min 8 chars, upper + lower + number" autocomplete="new-password">
        <span class="field-error" *ngIf="passwordErrors">{{ passwordErrors }}</span>
      </div>
      <div class="field">
        <label>Confirm password</label>
        <input type="password" formControlName="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password">
        <span class="field-error" *ngIf="confirmErrors">{{ confirmErrors }}</span>
      </div>

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <p class="auth-footer">Already have an account? <a routerLink="/auth/signin">Sign in</a></p>
  </div>
</div>
