<div class="setup-page">
  <div class="setup-card">
    <div class="setup-header">
      <div class="setup-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </div>
      <h1>Start Interview Practice</h1>
      <p class="setup-sub">Configure your session below.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="start()" class="setup-form">

      <div class="field">
        <label>Target Job Role</label>
        <div class="select-wrap">
          <select formControlName="job_role">
            <option value="" disabled>Select a role...</option>
            <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Question Category</label>
        <div class="category-grid">
          <div *ngFor="let c of categories" class="category-chip" [class.selected]="form.value.category === c.id" (click)="selectCategory(c.id)">
            <span class="cat-label">{{ c.label }}</span>
            <span class="cat-desc">{{ c.desc }}</span>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Difficulty Level</label>
        <div class="levels-grid">
          <div *ngFor="let l of levels" class="level-card" [class.selected]="form.value.level === l.id" [style.--level-color]="l.color" [style.--level-bg]="l.bg" [style.--level-border]="l.border" (click)="selectLevel(l.id)">
            <div class="level-top">
              <span class="level-name">{{ l.label }}</span>
              <span class="level-check" *ngIf="form.value.level === l.id">&#10003;</span>
            </div>
            <p class="level-desc">{{ l.desc }}</p>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Number of Questions</label>
        <div class="count-row">
          <button type="button" *ngFor="let n of questionCounts" class="count-btn" [class.selected]="form.value.count === n" (click)="form.patchValue({count: n})">{{ n }}</button>
        </div>
      </div>

      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-start" [disabled]="form.invalid || loading">
        <span *ngIf="!loading">Start Session</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <a routerLink="/dashboard" class="back-link">Back to Dashboard</a>
  </div>
</div>
