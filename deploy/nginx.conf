server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Redirect HTTP to HTTPS (uncomment after setting up SSL)
    # return 301 https://$host$request_uri;

    # Flask backend API
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # Long timeout for AI processing
        proxy_send_timeout 120s;
        client_max_body_size 50M;  # For audio uploads
    }

    # Angular frontend (serve static files)
    location / {
        root /home/ubuntu/Intervyou/frontend-dist;
        try_files $uri $uri/ /index.html;
    }
}
